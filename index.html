<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>成田空港→西大島 换乘指南</title>
<style>
:root{
  --bg:#0a0e1a;--bg2:#111827;--card:rgba(255,255,255,.06);--card-border:rgba(255,255,255,.1);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.3);
  --red:#ef4444;--red-glow:rgba(239,68,68,.3);
  --teal:#14b8a6;--teal-glow:rgba(20,184,166,.3);
  --green:#22c55e;--green-glow:rgba(34,197,94,.3);
  --yellow:#eab308;
  --glass:rgba(255,255,255,.05);--glass-border:rgba(255,255,255,.08);
  --font-base:14px;--font-sm:12px;--font-xs:10px;--font-lg:16px;--font-xl:20px;--font-2xl:24px;
}
body.senior{
  --font-base:20px;--font-sm:17px;--font-xs:15px;--font-lg:23px;--font-xl:28px;--font-2xl:34px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;font-size:var(--font-base);-webkit-tap-highlight-color:transparent}

/* Glass card */
.glass{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:16px}

/* Landing */
.landing{padding:20px 16px;min-height:100vh;display:flex;flex-direction:column}
.brand{text-align:center;padding:30px 0 20px}
.brand .logo{font-size:48px;margin-bottom:8px}
.brand h1{font-size:var(--font-2xl);font-weight:800;background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.3}
.brand .sub{font-size:var(--font-sm);color:var(--text3);margin-top:8px;line-height:1.5}
.route-pick{margin-top:16px;flex:1}
.route-card{border-radius:16px;padding:20px;margin-bottom:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.route-card::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,rgba(99,102,241,.5),rgba(168,85,247,.3));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.route-card:active{transform:scale(.97)}
.route-card .rc-badge{display:inline-block;font-size:var(--font-xs);padding:3px 10px;border-radius:20px;font-weight:700;margin-bottom:8px}
.r1 .rc-badge{background:rgba(239,68,68,.15);color:#f87171}
.r2 .rc-badge{background:rgba(20,184,166,.15);color:#5eead4}
.route-card .rc-name{font-size:var(--font-lg);font-weight:700;margin-bottom:4px}
.route-card .rc-stops{font-size:var(--font-sm);color:var(--text2);margin-bottom:12px}
.route-card .rc-meta{display:flex;gap:8px;flex-wrap:wrap}
.route-card .rc-meta span{font-size:var(--font-xs);padding:4px 10px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border)}
.route-card .rc-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--text3)}
.resume-card{border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2)}
.resume-card:active{opacity:.8}
.resume-card .rc-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);animation:pulse 2s infinite}
.resume-card .rc-info{flex:1;font-size:var(--font-sm);color:var(--text2)}
.resume-card .rc-info b{display:block;color:var(--text);font-size:var(--font-base)}
.resume-card .rc-go{color:var(--accent2);font-weight:700;font-size:var(--font-base)}
.landing-footer{display:flex;gap:8px;margin-top:auto;padding-top:20px}
.landing-footer button{flex:1;padding:10px;border:1px solid var(--card-border);border-radius:10px;background:var(--card);color:var(--text2);font-size:var(--font-sm);cursor:pointer}
.landing-footer button:active{background:rgba(255,255,255,.1)}

/* HUD Progress */
.hud{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 16px 14px;border-bottom:1px solid var(--card-border)}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hud-top .ht-mission{font-size:var(--font-xs);color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.hud-top .ht-back{font-size:var(--font-xs);color:var(--text3);cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--card-border);background:transparent}
.hud-bar{display:flex;align-items:center}
.hud-bar .hb-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex-shrink:0;z-index:1}
.hud-bar .hb-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--text3);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:var(--font-xs);font-weight:700;color:var(--text3);transition:.3s}
.hud-bar .hb-dot.done{border-color:var(--green);background:var(--green);color:#fff;box-shadow:0 0 10px var(--green-glow)}
.hud-bar .hb-dot.current{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow);animation:pulse 2s infinite}
.c2 .hb-dot.current{border-color:var(--teal);background:var(--teal);box-shadow:0 0 12px var(--teal-glow)}
.hud-bar .hb-name{font-size:8px;color:var(--text3);margin-top:3px;max-width:55px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud-bar .hb-line{flex:1;height:2px;background:var(--text3);min-width:6px;opacity:.3}
.hud-bar .hb-line.done{background:var(--green);opacity:1;box-shadow:0 0 6px var(--green-glow)}

/* Steps */
.steps-area{padding:12px 16px 80px}
.step-card{border-radius:16px;margin-bottom:14px;overflow:hidden;transition:.2s;background:var(--card);border:1px solid var(--card-border)}
.step-card.current-card{border-color:rgba(99,102,241,.3);box-shadow:0 0 20px rgba(99,102,241,.1)}
.c2 .step-card.current-card{border-color:rgba(20,184,166,.3);box-shadow:0 0 20px rgba(20,184,166,.1)}
.step-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.step-head .sh-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:var(--font-sm);font-weight:800;flex-shrink:0;background:var(--glass);color:var(--text3);border:1px solid var(--glass-border)}
.step-head .sh-num.done{background:rgba(34,197,94,.15);color:var(--green);border-color:rgba(34,197,94,.3)}
.step-head .sh-num.current{background:rgba(99,102,241,.15);color:var(--accent2);border-color:rgba(99,102,241,.3)}
.c2 .sh-num.current{background:rgba(20,184,166,.15);color:var(--teal);border-color:rgba(20,184,166,.3)}
.step-head .sh-info{flex:1}
.step-head .sh-mission{font-size:var(--font-xs);color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.c2 .sh-mission{color:var(--teal)}
.step-head .sh-title{font-size:var(--font-base);font-weight:700}
.step-head .sh-jp{font-size:var(--font-xs);color:var(--text3);margin-top:2px}
.step-head .sh-arrow{color:var(--text3);transition:transform .2s;font-size:var(--font-base)}
.step-head .sh-arrow.open{transform:rotate(90deg)}
.step-body{display:none;padding:0 16px 16px}
.step-body.open{display:block;animation:fadeIn .25s ease}

/* Mini-map */
.minimap{background:rgba(0,0,0,.3);border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--glass-border);font-size:var(--font-sm);position:relative;overflow:hidden}
.minimap::before{content:'MAP';position:absolute;top:8px;right:10px;font-size:9px;color:var(--text3);letter-spacing:2px;font-weight:700;opacity:.5}
.mm-floor{padding:8px 10px;border-radius:8px;margin-bottom:4px;display:flex;align-items:center;gap:8px;position:relative}
.mm-floor.active{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2)}
.c2 .mm-floor.active{background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.2)}
.mm-floor .mf-label{font-size:var(--font-xs);font-weight:700;color:var(--text3);width:32px;flex-shrink:0}
.mm-floor .mf-content{flex:1;font-size:var(--font-sm);color:var(--text2);line-height:1.5}
.mm-floor .mf-you{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);animation:pulse 2s infinite;margin-right:4px;vertical-align:middle}
.c2 .mf-you{background:var(--teal);box-shadow:0 0 8px var(--teal-glow)}
.mm-arrow{text-align:center;color:var(--text3);font-size:14px;margin:2px 0;animation:bounce .8s infinite}
.mm-line{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
.mm-line.keisei{background:#2563eb}.mm-line.hanzomon{background:#9333ea}.mm-line.shinjuku{background:#16a34a}.mm-line.access{background:#dc2626}

/* Checklist */
.checklist{margin:4px 0 8px}
.cl-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--glass-border)}
.cl-item:last-child{border-bottom:none}
.cl-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--text3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:1px}
.cl-check.checked{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green-glow)}
.cl-check svg{width:14px;height:14px;opacity:0;color:#fff;transition:.15s}
.cl-check.checked svg{opacity:1}
.cl-text{flex:1;font-size:var(--font-sm);line-height:1.6;color:var(--text2)}
.cl-text.checked{text-decoration:line-through;color:var(--text3)}
.cl-text .cl-jp{display:block;font-size:var(--font-xs);color:var(--text3);margin-top:1px}

/* Alerts */
.wrn{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:10px;padding:10px 12px;font-size:var(--font-sm);color:#fbbf24;margin-top:10px;line-height:1.5}
.wrn::before{content:"\26A0\FE0F "}
.wrn .wrn-jp{font-size:var(--font-xs);color:rgba(251,191,36,.6);display:block;margin-top:4px}
.tip{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px 12px;font-size:var(--font-sm);color:#4ade80;margin-top:10px;line-height:1.5}
.tip::before{content:"\1F4A1 "}
.tip .tip-jp{font-size:var(--font-xs);color:rgba(74,222,128,.6);display:block;margin-top:4px}
.ml{display:block;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:10px 12px;margin-top:8px;text-decoration:none;color:var(--accent2);font-size:var(--font-sm);font-weight:600;text-align:center;line-height:1.4;transition:.15s}
.ml:active{background:rgba(99,102,241,.15)}
.ml-photo{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.2);color:#fbbf24}

/* Next button */
.next-btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:var(--font-lg);font-weight:700;color:#fff;cursor:pointer;margin-top:16px;transition:.15s;position:relative;overflow:hidden}
.next-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.c2 .next-btn{background:linear-gradient(135deg,#14b8a6,#0d9488)}
.next-btn:active{transform:scale(.97);opacity:.9}
.next-btn.finish{background:linear-gradient(135deg,#22c55e,#16a34a)}
.next-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.1),transparent);animation:shimmer 3s infinite}

/* Done screen */
.done-screen{text-align:center;padding:60px 20px}
.done-screen .ds-emoji{font-size:80px;margin-bottom:20px}
.done-screen .ds-title{font-size:var(--font-2xl);font-weight:800;background:linear-gradient(135deg,#22c55e,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.done-screen .ds-sub{font-size:var(--font-base);color:var(--text2);margin:12px 0 30px;line-height:1.6}
.done-screen .ds-btn{padding:12px 28px;border:1px solid var(--card-border);border-radius:12px;background:var(--card);font-size:var(--font-sm);color:var(--text2);cursor:pointer}

/* Translation */
.trans-section{margin:0 16px 16px;border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--card-border)}
.trans-header{padding:14px 16px;font-size:var(--font-base);font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.trans-header .th-arrow{transition:transform .2s;color:var(--text3)}
.trans-header .th-arrow.open{transform:rotate(90deg)}
.trans-body{display:none;padding:0 16px 16px}
.trans-body.open{display:block}
.trans-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.trans-tabs::-webkit-scrollbar{display:none}
.tt-btn{padding:7px 12px;border:1px solid var(--card-border);border-radius:8px;font-size:var(--font-xs);white-space:nowrap;cursor:pointer;background:transparent;color:var(--text3);flex-shrink:0;transition:.15s}
.tt-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.phrase-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.phrase-card:active{background:rgba(255,255,255,.1)}
.phrase-card .pc-jp{font-size:var(--font-lg);font-weight:700;color:#f87171;line-height:1.5}
.phrase-card .pc-cn{font-size:var(--font-xs);color:var(--text3);margin-top:3px}
.phrase-card .pc-hint{font-size:var(--font-xs);color:var(--text3);margin-top:4px;opacity:.5}

/* Translator */
.translator{margin-top:14px;padding-top:14px;border-top:1px solid var(--glass-border)}
.translator .tr-label{font-size:var(--font-sm);font-weight:700;margin-bottom:8px}
.translator .tr-swap{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0;font-size:var(--font-xs);color:var(--text3)}
.translator .tr-swap button{background:var(--glass);border:1px solid var(--glass-border);border-radius:6px;padding:2px 10px;font-size:16px;cursor:pointer;color:var(--text2)}
.translator .tr-input-wrap{display:flex;gap:8px}
.translator textarea{flex:1;border:1px solid var(--card-border);border-radius:10px;padding:10px 12px;font-size:var(--font-base);font-family:inherit;resize:none;height:44px;line-height:1.4;outline:none;background:var(--glass);color:var(--text);transition:.15s}
.translator textarea:focus{border-color:var(--accent)}
.translator textarea::placeholder{color:var(--text3)}
.translator .tr-btn{width:56px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:var(--font-base);font-weight:700;cursor:pointer;flex-shrink:0}
.translator .tr-btn:active{opacity:.8}
.translator .tr-btn:disabled{opacity:.4}
.tr-result{margin-top:10px;display:none}
.tr-result.show{display:block}
.tr-result-card{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:14px;cursor:pointer}
.tr-result-card:active{background:rgba(99,102,241,.15)}
.tr-result-card .trc-target{font-size:var(--font-xl);font-weight:700;color:var(--accent2);line-height:1.5}
.tr-result-card .trc-source{font-size:var(--font-xs);color:var(--text3);margin-top:4px}
.tr-result-card .trc-hint{font-size:var(--font-xs);color:var(--text3);margin-top:6px;opacity:.5}
.tr-error{margin-top:8px;font-size:var(--font-xs);color:var(--red)}

/* Show overlay */
.show-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:30px;cursor:pointer}
.show-overlay.open{display:flex}
.show-overlay .so-jp{font-size:36px;font-weight:700;color:#fff;text-align:center;line-height:1.6;margin-bottom:16px}
.show-overlay .so-cn{font-size:16px;color:rgba(255,255,255,.4);text-align:center}
.show-overlay .so-close{font-size:12px;color:rgba(255,255,255,.2);margin-top:40px}
body.senior .show-overlay .so-jp{font-size:48px}

/* Footer */
.footer{text-align:center;font-size:var(--font-xs);color:var(--text3);padding:16px}
.reset-link{font-size:var(--font-xs);color:var(--text3);text-align:center;display:block;margin-top:12px;cursor:pointer;opacity:.5}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes shimmer{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Confetti */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998;overflow:hidden}
.confetti span{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 3s linear forwards}
</style>
</head>
<body>

<div id="app"></div>
<div class="show-overlay" id="showOverlay" onclick="closeShow()">

  <div class="so-cn" id="soCn"></div>
  <div class="so-close">点击任意处关闭 / タップして閉じる</div>
</div>

// ===== DATA =====
const ROUTES = [

      {

        ],
        warnings:[
          {cn:'不要坐「スカイライナー」！需要额外买特急券，很贵！',jp:'スカイライナーは別料金！アクセス特急に乗ってください！'},

// ===== STATE =====
let state = loadState();
let seniorMode = localStorage.getItem('narita-senior') === '1';
if(seniorMode) document.body.classList.add('senior');

function loadState(){
  try{ const s = JSON.parse(localStorage.getItem('narita-v4')); if(s && s.route!==undefined) return s; }catch(e){}
  return {route:null, step:0, checks:{}};
}
function saveState(){ localStorage.setItem('narita-v4', JSON.stringify(state)); }
function resetState(){ state={route:null,step:0,checks:{}}; saveState(); render(); }

// ===== RENDER =====
const app = document.getElementById('app');

function render(){
  if(state.route===null) renderLanding();
  else{
    const route = ROUTES[state.route];
    if(state.step>=route.steps.length) renderDone(route);
    else renderJourney(route);
  }
  renderTranslation();
}

function renderLanding(){
  // Check if there's saved progress
  let saved = null;
  try{ const s=JSON.parse(localStorage.getItem('narita-v4')); if(s&&s.route!==null) saved=s; }catch(e){}

  let resumeHtml='';
  if(saved){
    const r=ROUTES[saved.route];
    const sn = saved.step<r.steps.length ? r.steps[saved.step].title.cn : '已完成';
    resumeHtml=`
      <div class="resume-card" onclick="state=loadState();render()">
        <div class="rc-dot"></div>
        <div class="rc-info"><b>继续上次进度</b>${r.label} · ${sn}</div>
        <div class="rc-go">继续 ›</div>
      </div>`;
  }

  let html=`<div class="landing">
    <div class="brand">
      <div class="logo">🚃</div>
      <h1>成田空港 → 西大島</h1>
      <div class="sub">中日双语换乘指南<br>中日二ヶ国語ガイド</div>
    </div>
    ${resumeHtml}
    <div class="route-pick">`;

  ROUTES.forEach((r,i)=>{
    html+=`
      <div class="route-card ${i===0?'r1':'r2'}" onclick="selectRoute(${i})">
        <span class="rc-badge">${r.label}</span>
        <div class="rc-name">${r.name}</div>
        <div class="rc-stops">${r.stops.join(' → ')}</div>
        <div class="rc-meta">
          <span>⏱ ${r.summary.time}</span>
          <span>💰 ${r.summary.cost}</span>
          <span>🔄 ${r.summary.transfers}</span>
        </div>
        <div class="rc-arrow">›</div>
      </div>`;
  });

  html+=`</div>
    <div class="landing-footer">
      <button onclick="toggleSenior()">${seniorMode?'✓ ':''}大字模式</button>
      <button onclick="installPWA()">📲 添加到桌面</button>
    </div>
  </div>`;
  app.innerHTML=html;
}

function renderJourney(route){
  const ci=route.accentClass;

  // HUD
  let hud=`<div class="hud ${ci}">
    <div class="hud-top">
      <span class="ht-mission">${route.label} · STEP ${state.step+1}/${route.steps.length}</span>
      <button class="ht-back" onclick="goBack()">← 返回</button>
    </div>
    <div class="hud-bar">`;

  route.stops.forEach((stop,i)=>{
    if(i>0) hud+=`<div class="hb-line ${i<=state.step?'done':''}"></div>`;
    let dc=i<state.step?'done':i===state.step?'current':'';
    hud+=`<div class="hb-node" onclick="jumpStep(${i})">
      <div class="hb-dot ${dc}">${dc==='done'?'✓':i}</div>
      <div class="hb-name">${stop}</div>
    </div>`;
  });
  hud+=`</div></div>`;

  // Steps
  let steps=`<div class="steps-area ${ci}">`;
  route.steps.forEach((step,i)=>{
    const isDone=i<state.step, isCurrent=i===state.step, isOpen=isCurrent;
    const numC=isDone?'done':isCurrent?'current':'';
    const cardC=isCurrent?'current-card':'';

    steps+=`<div class="step-card ${cardC}" id="step-${i}">
      <div class="step-head" onclick="toggleStep(${i})">
        <div class="sh-num ${numC}">${isDone?'✓':i}</div>
        <div class="sh-info">
          <div class="sh-mission">${step.mission}</div>
          <div class="sh-title">${step.title.cn}</div>
          <div class="sh-jp">${step.title.jp}</div>
        </div>
        <div class="sh-arrow ${isOpen?'open':''}">›</div>
      </div>
      <div class="step-body ${isOpen?'open':''}" id="step-body-${i}">`;

    // Mini-map
    if(step.minimap&&step.minimap.length){
      steps+=`<div class="minimap">`;
      step.minimap.forEach((m,mi)=>{
        if(mi>0) steps+=`<div class="mm-arrow">↓</div>`;
        steps+=`<div class="mm-floor ${m.active?'active':''}">`;
        if(m.floor) steps+=`<span class="mf-label">${m.floor}</span>`;
        else steps+=`<span class="mf-label"></span>`;
        steps+=`<span class="mf-content">${m.you?'<span class="mf-you"></span>':''}${m.content}</span>`;
        steps+=`</div>`;
      });
      steps+=`</div>`;
    }

    // Checklist
    steps+=`<div class="checklist">`;
    step.checklist.forEach((item,j)=>{
      const key=`${state.route}-${i}-${j}`, checked=state.checks[key];
      steps+=`<div class="cl-item">
        <div class="cl-check ${checked?'checked':''}" onclick="toggleCheck('${key}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="cl-text ${checked?'checked':''}" onclick="toggleCheck('${key}')">${item.cn}<span class="cl-jp">${item.jp}</span></div>
      </div>`;
    });
    steps+=`</div>`;

    // Warnings, Tips, Links
    step.warnings.forEach(w=>{
      steps+=`<div class="wrn">${w.cn}<span class="wrn-jp">${w.jp}</span></div>`;
    });
    step.tips.forEach(t=>{
      steps+=`<div class="tip">${t.cn}<span class="tip-jp">${t.jp}</span></div>`;
    });
    step.links.forEach(l=>{
      steps+=`<a class="ml ${l.photo?'ml-photo':''}" href="${l.url}" target="_blank">${l.text.cn}<br><span style="font-size:var(--font-xs)">${l.text.jp}</span></a>`;
    });

    if(isCurrent){
      const isLast=i===route.steps.length-1;
      steps+=`<button class="next-btn ${isLast?'finish':''}" onclick="nextStep()">
        ${isLast?'🎉 到达西大島！':'✓ 完成，下一步 →'}
      </button>`;
    }
    steps+=`</div></div>`;
  });

  steps+=`<div class="reset-link" onclick="if(confirm('确定重置？'))resetState()">重置进度</div></div>`;
  app.innerHTML=hud+steps;

  setTimeout(()=>{
    const el=document.getElementById(`step-${state.step}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function renderDone(route){
  const ci=route.accentClass;
  app.innerHTML=`
    <div class="hud ${ci}">
      <div class="hud-top">
        <span class="ht-mission">MISSION COMPLETE</span>
        <button class="ht-back" onclick="goBack()">← 返回</button>
      </div>
      <div class="hud-bar">
        ${route.stops.map((s,i)=>`${i>0?'<div class="hb-line done"></div>':''}
          <div class="hb-node"><div class="hb-dot done">✓</div><div class="hb-name">${s}</div></div>`).join('')}
      </div>
    </div>
    <div class="done-screen">
      <div class="ds-emoji">🎉🏠</div>
      <div class="ds-title">MISSION COMPLETE</div>
      <div class="ds-sub">到家了！お疲れ様でした！<br>所有步骤已完成</div>
      <button class="ds-btn" onclick="resetState()">重新开始</button>
    </div>`;
  showConfetti();
}

function renderTranslation(){
  document.querySelectorAll('.trans-section,.footer').forEach(el=>el.remove());
  const cats=Object.keys(PHRASES);
  const activeCat=window._transCat||cats[0];
  const isOpen=window._transOpen!==false;

  let html=`<div class="trans-section">
    <div class="trans-header" onclick="toggleTrans()">
      <span>📖 中日翻译助手</span>
      <span class="th-arrow ${isOpen?'open':''}">›</span>
    </div>
    <div class="trans-body ${isOpen?'open':''}">
      <div class="trans-tabs">`;
  cats.forEach(c=>{
    html+=`<div class="tt-btn ${c===activeCat?'active':''}" onclick="switchCat('${c}')">${PHRASES[c].icon} ${PHRASES[c].label}</div>`;
  });
  html+=`</div>`;
  PHRASES[activeCat].items.forEach(item=>{
    html+=`<div class="phrase-card" onclick="showPhrase('${esc(item.jp)}','${esc(item.cn)}')">
      <div class="pc-jp">${item.jp}</div>
      <div class="pc-cn">${item.cn}</div>
      <div class="pc-hint">点击放大 / タップして拡大</div>
    </div>`;
  });

  // Translator
  const trDir=window._trDir||'zh2ja';
  const srcL=trDir==='zh2ja'?'中文':'日本語';
  const tgtL=trDir==='zh2ja'?'日本語':'中文';
  const trR=window._trResult||'';
  const trS=window._trSource||'';
  const trE=window._trError||'';
  const trL=window._trLoading||false;

  html+=`<div class="translator">
    <div class="tr-label">✏️ 实时翻译</div>
    <div class="tr-swap"><span>${srcL}</span><button onclick="swapDir()">⇄</button><span>${tgtL}</span></div>
    <div class="tr-input-wrap">
      <textarea id="trInput" placeholder="${trDir==='zh2ja'?'输入中文...':'日本語を入力...'}" oninput="autoResize(this)">${trS}</textarea>
      <button class="tr-btn" onclick="doTranslate()" ${trL?'disabled':''}>${trL?'...':'翻译'}</button>
    </div>
    ${trE?`<div class="tr-error">${trE}</div>`:''}
    <div class="tr-result ${trR?'show':''}">
      <div class="tr-result-card" onclick="showPhrase('${esc(trDir==='zh2ja'?trR:trS)}','${esc(trDir==='zh2ja'?trS:trR)}')">
        <div class="trc-target">${trR}</div>
        <div class="trc-source">${trS}</div>
        <div class="trc-hint">点击放大给对方看</div>
      </div>
    </div>
  </div>`;

  html+=`</div></div><div class="footer">2026.02 ｜ 仅供参考</div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

// ===== ACTIONS =====
function selectRoute(i){state={route:i,step:0,checks:{}};saveState();render();window.scrollTo(0,0);}
function nextStep(){state.step++;saveState();render();window.scrollTo(0,0);}
function jumpStep(i){const el=document.getElementById(`step-${i}`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
function toggleStep(i){const b=document.getElementById(`step-body-${i}`);if(!b)return;b.classList.toggle('open');document.getElementById(`step-${i}`).querySelector('.sh-arrow').classList.toggle('open');}
function toggleCheck(key){state.checks[key]=!state.checks[key];saveState();render();}
function goBack(){state.route=null;saveState();render();window.scrollTo(0,0);}

// Translation
function toggleTrans(){window._transOpen=!(window._transOpen!==false);renderTranslation();}
function switchCat(c){window._transCat=c;renderTranslation();}
function showPhrase(jp,cn){document.getElementById('soJp').textContent=jp;document.getElementById('soCn').textContent=cn;document.getElementById('showOverlay').classList.add('open');}
function closeShow(){document.getElementById('showOverlay').classList.remove('open');}
function swapDir(){window._trDir=(window._trDir||'zh2ja')==='zh2ja'?'ja2zh':'zh2ja';window._trResult='';window._trSource='';window._trError='';renderTranslation();}
function autoResize(el){el.style.height='44px';el.style.height=el.scrollHeight+'px';}
async function doTranslate(){
  const input=document.getElementById('trInput');const text=input.value.trim();if(!text)return;
  const dir=window._trDir||'zh2ja';const sl=dir==='zh2ja'?'zh-CN':'ja';const tl=dir==='zh2ja'?'ja':'zh-CN';
  window._trLoading=true;window._trSource=text;window._trError='';renderTranslation();
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);
    if(!r.ok)throw 0;const d=await r.json();window._trResult=d[0].map(s=>s[0]).join('');
  }catch(e){window._trResult='';window._trError='翻译失败，请检查网络';}
  window._trLoading=false;renderTranslation();
}

// Senior mode
function toggleSenior(){
  seniorMode=!seniorMode;
  document.body.classList.toggle('senior',seniorMode);
  localStorage.setItem('narita-senior',seniorMode?'1':'0');
  render();
}

// PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
function installPWA(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
  else{alert('请使用浏览器的"添加到主屏幕"功能\nブラウザの「ホーム画面に追加」を使ってください');}
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}

// Confetti
function showConfetti(){
  const c=document.createElement('div');c.className='confetti';
  const colors=['#6366f1','#ec4899','#22c55e','#eab308','#14b8a6','#f87171'];
  for(let i=0;i<40;i++){
    const s=document.createElement('span');
    s.style.cssText=`left:${Math.random()*100}%;top:${-Math.random()*20}%;background:${colors[i%colors.length]};animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px`;
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),5000);
}

// ===== INIT =====
render();
</script>
