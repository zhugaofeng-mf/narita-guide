<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans SC","PingFang SC",sans-serif;background:#f0f4f8;color:#333;max-width:480px;margin:0 auto;padding:0;min-height:100vh;padding-bottom:60px}

/* Landing */
.landing{padding:20px 14px}
.landing h1{text-align:center;font-size:22px;color:#1a365d;margin:20px 0 6px;line-height:1.3}
.landing .sub{text-align:center;font-size:13px;color:#888;margin-bottom:24px}
.route-card{border-radius:14px;padding:18px;margin-bottom:14px;color:#fff;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.route-card:active{transform:scale(.97)}
.route-card.r1{background:linear-gradient(135deg,#667eea,#764ba2)}
.route-card.r2{background:linear-gradient(135deg,#2a9d8f,#264653)}
.route-card .rt-label{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:1px}
.route-card .rt-name{font-size:18px;font-weight:700;margin:4px 0}
.route-card .rt-stops{font-size:13px;opacity:.9;margin-bottom:8px}
.route-card .rt-meta{display:flex;gap:10px;font-size:12px}
.route-card .rt-meta span{background:rgba(255,255,255,.2);border-radius:6px;padding:3px 8px}
.route-card .rt-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:24px;opacity:.6}
.resume-bar{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;cursor:pointer}
.resume-bar:active{background:#f7f7f7}
.resume-bar .rb-icon{width:36px;height:36px;border-radius:50%;background:#e63946;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.resume-bar .rb-icon.c2{background:#2a9d8f}
.resume-bar .rb-text{flex:1;font-size:13px;color:#666}
.resume-bar .rb-text b{display:block;font-size:14px;color:#333}
.resume-bar .rb-go{color:#e63946;font-weight:700;font-size:14px}

/* Progress bar */
.progress-wrap{position:sticky;top:0;z-index:100;background:#fff;padding:10px 14px 12px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-header .ph-title{font-size:14px;font-weight:700;color:#1a365d}
.progress-header .ph-back{font-size:12px;color:#888;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#fff}
.progress-header .ph-back:active{background:#f0f0f0}
.progress-bar{display:flex;align-items:center;gap:0}
.progress-bar .pb-stop{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex-shrink:0;position:relative;z-index:1}
.progress-bar .pb-dot{width:28px;height:28px;border-radius:50%;border:3px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#999;transition:.2s}
.progress-bar .pb-dot.done{border-color:#4caf50;background:#4caf50;color:#fff}
.progress-bar .pb-dot.current{border-color:#e63946;background:#e63946;color:#fff;box-shadow:0 0 0 4px rgba(230,57,70,.2)}
.c2 .pb-dot.current{border-color:#2a9d8f;background:#2a9d8f;box-shadow:0 0 0 4px rgba(42,157,143,.2)}
.progress-bar .pb-name{font-size:9px;color:#666;margin-top:3px;white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis}
.progress-bar .pb-line{flex:1;height:3px;background:#ddd;min-width:8px}
.progress-bar .pb-line.done{background:#4caf50}

/* Step cards */
.steps-wrap{padding:10px 14px}
.step-card{background:#fff;border-radius:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:all .2s}
.step-head{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.step-head .sh-num{width:30px;height:30px;border-radius:50%;background:#ddd;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.step-head .sh-num.done{background:#4caf50}
.step-head .sh-num.current{background:#e63946}
.c2 .step-head .sh-num.current{background:#2a9d8f}
.step-head .sh-info{flex:1}
.step-head .sh-title{font-size:14px;font-weight:700;color:#333}
.step-head .sh-jp{font-size:11px;color:#999;margin-top:1px}
.step-head .sh-arrow{font-size:14px;color:#ccc;transition:transform .2s}
.step-head .sh-arrow.open{transform:rotate(90deg)}
.step-body{display:none;padding:0 16px 16px;border-top:1px solid #f0f0f0}
.step-body.open{display:block}

/* Checklist */
.checklist{margin:12px 0}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.cl-item:last-child{border-bottom:none}
.cl-check{width:24px;height:24px;border-radius:6px;border:2px solid #ddd;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px}
.cl-check.checked{background:#4caf50;border-color:#4caf50;color:#fff}
.cl-check svg{width:14px;height:14px;opacity:0;transition:.15s}
.cl-check.checked svg{opacity:1}
.cl-text{flex:1;font-size:13px;line-height:1.5;color:#555}
.cl-text.checked{text-decoration:line-through;color:#bbb}
.cl-text .cl-jp{display:block;font-size:11px;color:#999;margin-top:2px}
.cl-text.checked .cl-jp{color:#ccc}

/* Warnings, tips, links */
.wrn{background:#fff3cd;border-radius:8px;padding:10px 12px;font-size:13px;color:#856404;margin-top:10px;line-height:1.5}
.wrn::before{content:"\26A0\FE0F "}
.tip{background:#d4edda;border-radius:8px;padding:10px 12px;font-size:13px;color:#155724;margin-top:10px;line-height:1.5}
.tip::before{content:"\1F4A1 "}
.ml{display:block;background:#e8f4fd;border:1px solid #bee3f8;border-radius:8px;padding:10px 12px;margin-top:8px;text-decoration:none;color:#2b6cb0;font-size:12px;font-weight:600;text-align:center;line-height:1.4}
.ml::before{content:"\1F5FA\FE0F "}
.ml-photo{background:#fff3cd;border-color:#ffc107;color:#856404}
.ml-photo::before{content:"\1F4F8 "}

/* Next button */
.next-btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;color:#fff;background:#e63946;cursor:pointer;margin-top:14px;transition:.15s}
.c2 .next-btn{background:#2a9d8f}
.next-btn:active{transform:scale(.97);opacity:.9}
.next-btn.finish{background:linear-gradient(135deg,#4caf50,#2e7d32)}

/* Done overlay */
.done-screen{display:none;text-align:center;padding:40px 20px}
.done-screen.show{display:block}
.done-screen .ds-emoji{font-size:60px;margin-bottom:16px}
.done-screen .ds-title{font-size:22px;font-weight:700;color:#1a365d;margin-bottom:6px}
.done-screen .ds-sub{font-size:14px;color:#888;margin-bottom:24px}
.done-screen .ds-reset{padding:12px 24px;border:1px solid #ddd;border-radius:10px;background:#fff;font-size:14px;color:#666;cursor:pointer}

/* Translation Helper */
.trans-section{margin:16px 14px 0;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
.trans-header{padding:14px 16px;font-size:15px;font-weight:700;color:#1a365d;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.trans-header .th-arrow{transition:transform .2s;font-size:14px;color:#ccc}
.trans-header .th-arrow.open{transform:rotate(90deg)}
.trans-body{display:none;padding:0 16px 16px}
.trans-body.open{display:block}
.trans-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.trans-tabs::-webkit-scrollbar{display:none}
.tt-btn{padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:12px;white-space:nowrap;cursor:pointer;background:#fff;color:#666;flex-shrink:0;transition:.15s}
.tt-btn.active{background:#1a365d;color:#fff;border-color:#1a365d}
.phrase-card{background:#f7f7f7;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.phrase-card:active{background:#eee}
.phrase-card .pc-jp{font-size:16px;font-weight:700;color:#e63946;line-height:1.5}
.phrase-card .pc-cn{font-size:12px;color:#888;margin-top:3px}
.phrase-card .pc-hint{font-size:10px;color:#bbb;margin-top:4px}

/* Show mode overlay */
.show-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:30px;cursor:pointer}
.show-overlay.open{display:flex}
.show-overlay .so-jp{font-size:32px;font-weight:700;color:#fff;text-align:center;line-height:1.6;margin-bottom:16px}
.show-overlay .so-cn{font-size:14px;color:rgba(255,255,255,.5);text-align:center}
.show-overlay .so-close{font-size:12px;color:rgba(255,255,255,.3);margin-top:30px}

/* Footer */
.footer{text-align:center;font-size:11px;color:#999;padding:16px 14px}

/* Reset btn in progress */
.reset-link{font-size:11px;color:#ccc;text-align:center;display:block;margin-top:12px;cursor:pointer}
.reset-link:active{color:#e63946}

/* Animations */
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-body.open{animation:slideIn .2s ease}
</style>
</head>

      {cn:'请问去西大島多少钱？',jp:'西大島までいくらですか？'},
      {cn:'我的IC卡余额不够了。',jp:'ICカードの残高が足りません。'},
    ]
  },
  directions:{
    label:'问路',
    icon:'🗺️',
    items:[
      {cn:'请问出口在哪里？',jp:'出口はどこですか？'},
      {cn:'请问厕所在哪里？',jp:'トイレはどこですか？'},
      {cn:'请问电梯在哪里？',jp:'エレベーターはどこですか？'},
      {cn:'请问检票口在哪里？',jp:'改札はどこですか？'},
      {cn:'请问哪个是1号站台？',jp:'1番ホームはどちらですか？'},
      {cn:'我迷路了，能帮帮我吗？',jp:'道に迷いました。助けてもらえますか？'},
    ]
  },
  emergency:{
    label:'紧急求助',
    icon:'🆘',
    items:[
      {cn:'请帮帮我！',jp:'助けてください！'},
      {cn:'我不会说日语。',jp:'日本語が話せません。'},
      {cn:'可以帮我叫出租车吗？',jp:'タクシーを呼んでもらえますか？'},
      {cn:'我的东西丢了。',jp:'荷物をなくしました。'},
      {cn:'请帮我叫警察。',jp:'警察を呼んでください。'},
      {cn:'我身体不舒服。',jp:'体調が悪いです。'},
      {cn:'请问附近有药店吗？',jp:'近くに薬局はありますか？'},
    ]
  },
};

// ===== STATE =====
let state = loadState();

function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem('narita-v3'));
    if(s && s.route !== undefined) return s;
  }catch(e){}
  return {route:null, step:0, checks:{}};
}
function saveState(){
  localStorage.setItem('narita-v3', JSON.stringify(state));
}
function resetState(){
  state = {route:null, step:0, checks:{}};
  saveState();
  render();
}

// ===== RENDER =====
const app = document.getElementById('app');

function render(){
  if(state.route === null){
    renderLanding();
  } else {
    const route = ROUTES[state.route];
    if(state.step >= route.steps.length){
      renderDone(route);
    } else {
      renderJourney(route);
    }
  }
  renderTranslation();
}

function renderLanding(){
  let resumeHtml = '';
  if(loadState().route !== null){
    const s = loadState();
    const r = ROUTES[s.route];
    const stepName = s.step < r.steps.length ? r.steps[s.step].title.cn : '已完成';
    resumeHtml = `
      <div class="resume-bar" onclick="state=loadState();render()">
        <div class="rb-icon ${s.route===1?'c2':''}">${s.route===0?'①':'②'}</div>
        <div class="rb-text"><b>继续上次的进度</b>${r.label} · ${stepName}</div>
        <div class="rb-go">继续 ›</div>
      </div>`;
  }

  let html = `
    <div class="landing">
      <h1>✈️ 成田空港 → 西大島<br>换乘指南</h1>
      <p class="sub">中日双语 · 一步一步带你到家<br>中日二ヶ国語 · ステップバイステップガイド</p>
      ${resumeHtml}`;

  ROUTES.forEach((r,i) => {
    html += `
      <div class="route-card ${i===0?'r1':'r2'}" onclick="selectRoute(${i})">
        <div class="rt-label">${r.label}</div>
        <div class="rt-name">${r.name}</div>
        <div class="rt-stops">${r.stops.join(' → ')}</div>
        <div class="rt-meta">
          <span>⏱ ${r.summary.time}</span>
          <span>💰 ${r.summary.cost}</span>
          <span>🔄 ${r.summary.transfers}</span>
        </div>
        <div class="rt-arrow">›</div>
      </div>`;
  });

  html += `</div>`;
  app.innerHTML = html;
}

function renderJourney(route){
  const ci = route.id === 2 ? 'c2' : '';

  // Progress bar
  let progressHtml = `
    <div class="progress-wrap ${ci}">
      <div class="progress-header">
        <span class="ph-title">${route.label} ${route.name}</span>
        <button class="ph-back" onclick="goBack()">← 返回</button>
      </div>
      <div class="progress-bar">`;

  route.stops.forEach((stop, i) => {
    const stepIdx = i; // stop index maps to step index (0=charge, 1=first train, etc)
    let dotClass = '';
    if(i < state.step) dotClass = 'done';
    else if(i === state.step) dotClass = 'current';

    if(i > 0) {
      progressHtml += `<div class="pb-line ${i <= state.step ? 'done' : ''}"></div>`;
    }
    progressHtml += `
      <div class="pb-stop" onclick="jumpStep(${i})">
        <div class="pb-dot ${dotClass}">${dotClass==='done'?'✓':i}</div>
        <div class="pb-name">${stop}</div>
      </div>`;
  });

  progressHtml += `</div></div>`;

  // Steps
  let stepsHtml = `<div class="steps-wrap ${ci}">`;

  route.steps.forEach((step, i) => {
    const isDone = i < state.step;
    const isCurrent = i === state.step;
    const isOpen = isCurrent || isDone;
    const numClass = isDone ? 'done' : (isCurrent ? 'current' : '');

    stepsHtml += `
      <div class="step-card" id="step-${i}">
        <div class="step-head" onclick="toggleStep(${i})">
          <div class="sh-num ${numClass}">${isDone?'✓':i}</div>
          <div class="sh-info">
            <div class="sh-title">${step.title.cn}</div>
            <div class="sh-jp">${step.title.jp}</div>
          </div>
          <div class="sh-arrow ${isOpen?'open':''}">›</div>
        </div>
        <div class="step-body ${isOpen?'open':''}" id="step-body-${i}">`;

    // Checklist
    stepsHtml += `<div class="checklist">`;
    step.checklist.forEach((item, j) => {
      const key = `${state.route}-${i}-${j}`;
      const checked = state.checks[key];
      stepsHtml += `
        <div class="cl-item">
          <div class="cl-check ${checked?'checked':''}" onclick="toggleCheck('${key}',${i})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="cl-text ${checked?'checked':''}" onclick="toggleCheck('${key}',${i})">${item.cn}<span class="cl-jp">${item.jp}</span></div>
        </div>`;
    });
    stepsHtml += `</div>`;

    // Warnings
    step.warnings.forEach(w => {
      stepsHtml += `<div class="wrn">${w.cn}<br><span style="font-size:12px;color:#a07000">${w.jp}</span></div>`;
    });

    // Tips
    step.tips.forEach(t => {
      stepsHtml += `<div class="tip">${t.cn}<br><span style="font-size:12px;color:#0f5132">${t.jp}</span></div>`;
    });

    // Links
    step.links.forEach(l => {
      stepsHtml += `<a class="ml ${l.photo?'ml-photo':''}" href="${l.url}" target="_blank">${l.text.cn}<br><span style="font-size:11px">${l.text.jp}</span></a>`;
    });

    // Next button (only on current step)
    if(isCurrent){
      const isLast = i === route.steps.length - 1;
      stepsHtml += `<button class="next-btn ${isLast?'finish':''}" onclick="nextStep()">
        ${isLast ? '🎉 到达西大島！/ 西大島に到着！' : '✓ 完成，下一步 / 次のステップへ'}
      </button>`;
    }

    stepsHtml += `</div></div>`;
  });

  stepsHtml += `
    <div class="reset-link" onclick="if(confirm('确定要重置进度吗？'))resetState()">重置进度 / リセット</div>
  </div>`;

  app.innerHTML = progressHtml + stepsHtml;

  // Scroll to current step
  setTimeout(() => {
    const el = document.getElementById(`step-${state.step}`);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function renderDone(route){
  app.innerHTML = `
    <div class="progress-wrap ${route.id===2?'c2':''}">
      <div class="progress-header">
        <span class="ph-title">${route.label} 已完成！</span>
        <button class="ph-back" onclick="goBack()">← 返回</button>
      </div>
      <div class="progress-bar">
        ${route.stops.map((s,i) => `
          ${i>0?'<div class="pb-line done"></div>':''}
          <div class="pb-stop">
            <div class="pb-dot done">✓</div>
            <div class="pb-name">${s}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="done-screen show">
      <div class="ds-emoji">🎉🏠</div>
      <div class="ds-title">到家了！</div>
      <div class="ds-sub">着きました！お疲れ様でした！<br>所有步骤已完成</div>
      <button class="ds-reset" onclick="resetState()">重新开始 / 最初からやり直す</button>
    </div>`;
}

function renderTranslation(){
  // Remove existing
  document.querySelectorAll('.trans-section,.footer').forEach(el=>el.remove());

  const cats = Object.keys(PHRASES);
  const activeCat = window._transCat || cats[0];
  const isOpen = window._transOpen !== false;

  let html = `
    <div class="trans-section">
      <div class="trans-header" onclick="toggleTrans()">
        <span>📖 中日翻译助手 / 日中フレーズ集</span>
        <span class="th-arrow ${isOpen?'open':''}">›</span>
      </div>
      <div class="trans-body ${isOpen?'open':''}">
        <div class="trans-tabs">`;

  cats.forEach(cat => {
    const p = PHRASES[cat];
    html += `<div class="tt-btn ${cat===activeCat?'active':''}" onclick="switchCat('${cat}')">${p.icon} ${p.label}</div>`;
  });

  html += `</div>`;

  PHRASES[activeCat].items.forEach(item => {
    html += `
      <div class="phrase-card" onclick="showPhrase('${esc(item.jp)}','${esc(item.cn)}')">
        <div class="pc-jp">${item.jp}</div>
        <div class="pc-cn">${item.cn}</div>
        <div class="pc-hint">点击放大给日本人看 / タップして拡大表示</div>
      </div>`;
  });

  html += `</div></div>
    <div class="footer">制作日期：2026年2月 ｜ 信息仅供参考，以现场实际为准</div>`;

  app.insertAdjacentHTML('afterend','');
  document.body.insertAdjacentHTML('beforeend', html);
}

function esc(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ===== ACTIONS =====
function selectRoute(i){
  state = {route:i, step:0, checks:{}};
  saveState();
  render();
  window.scrollTo(0,0);
}

function nextStep(){
  state.step++;
  saveState();
  render();
  window.scrollTo(0,0);
}

function jumpStep(i){
  if(i <= state.step){
    const body = document.getElementById(`step-body-${i}`);
    const el = document.getElementById(`step-${i}`);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function toggleStep(i){
  const body = document.getElementById(`step-body-${i}`);
  const card = document.getElementById(`step-${i}`);
  if(!body) return;
  body.classList.toggle('open');
  card.querySelector('.sh-arrow').classList.toggle('open');
}

function toggleCheck(key, stepIdx){
  state.checks[key] = !state.checks[key];
  saveState();
  // Re-render just the checkbox
  render();
}

function goBack(){
  state.route = null;
  // Don't reset progress, just go to landing
  saveState();
  render();
  window.scrollTo(0,0);
}

// Translation
function toggleTrans(){
  window._transOpen = !(window._transOpen !== false);
  renderTranslation();
}
function switchCat(cat){
  window._transCat = cat;
  renderTranslation();
}
function showPhrase(jp, cn){
  document.getElementById('soJp').textContent = jp;
  document.getElementById('soCn').textContent = cn;
  document.getElementById('showOverlay').classList.add('open');
}
function closeShow(){
  document.getElementById('showOverlay').classList.remove('open');
}

// ===== INIT =====
render();
</script>
</body>
</html>
