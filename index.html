<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>成田空港 换乘导航</title>
<style>
:root{
  --bg:#0a0e1a;--bg2:#111827;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --accent:#818cf8;--accent-bg:rgba(129,140,248,.12);--accent-border:rgba(129,140,248,.3);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,.12);--teal-border:rgba(45,212,191,.3);
  --green:#4ade80;--green-bg:rgba(74,222,128,.12);
  --red:#f87171;--yellow:#fbbf24;
  --fs:16px;
}
body.senior{--fs:22px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;font-size:var(--fs);overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* ===== LANDING ===== */
.landing{min-height:100vh;padding:16px;display:flex;flex-direction:column}
.brand{text-align:center;padding:40px 0 30px}
.brand .logo{font-size:56px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(129,140,248,.4))}
.brand h1{font-size:1.6em;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand .sub{font-size:.75em;color:var(--text3);margin-top:8px}
.rc{border-radius:16px;padding:20px;margin-bottom:12px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
.rc:active{transform:scale(.97)}
.rc::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1.5px;background:linear-gradient(135deg,var(--accent),#c084fc);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.rc.t2::before{background:linear-gradient(135deg,var(--teal),#6ee7b7)}
.rc .rc-badge{display:inline-block;font-size:.6em;padding:3px 10px;border-radius:20px;font-weight:700;margin-bottom:10px;background:var(--accent-bg);color:var(--accent)}
.rc.t2 .rc-badge{background:var(--teal-bg);color:var(--teal)}
.rc .rc-name{font-size:1.15em;font-weight:700;margin-bottom:6px}
.rc .rc-visual{display:flex;align-items:center;gap:4px;margin:12px 0;font-size:.7em;color:var(--text2)}
.rc .rc-visual .rv-stop{padding:4px 8px;border-radius:6px;background:var(--card);border:1px solid var(--border);white-space:nowrap}
.rc .rc-visual .rv-arrow{color:var(--text3)}
.rc .rc-meta{display:flex;gap:8px;font-size:.7em}
.rc .rc-meta span{padding:4px 10px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text2)}
.rc .rc-go{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:1.3em;color:var(--text3)}
.resume-bar{border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--accent-bg);border:1px solid var(--accent-border)}
.resume-bar:active{opacity:.8}
.resume-bar .rb-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite;flex-shrink:0}
.resume-bar .rb-text{flex:1;font-size:.8em;color:var(--text2)}
.resume-bar .rb-text b{display:block;color:var(--text);font-size:1em}
.resume-bar .rb-go{color:var(--accent);font-weight:700}
.l-footer{display:flex;gap:8px;margin-top:auto;padding-top:16px}
.l-footer button{flex:1;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text2);font-size:.8em;cursor:pointer}
.l-footer button:active{background:rgba(255,255,255,.1)}

/* ===== NAV MODE ===== */
.nav{min-height:100vh;display:flex;flex-direction:column}

/* Top bar */
.topbar{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,14,26,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.topbar .tb-back{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text2);font-size:.7em;cursor:pointer}
.topbar .tb-step{font-size:.7em;color:var(--accent);font-weight:700;letter-spacing:1px}
.c2 .tb-step{color:var(--teal)}
.topbar .tb-dots{display:flex;gap:4px}
.topbar .tb-dots span{width:8px;height:8px;border-radius:50%;background:var(--text3)}
.topbar .tb-dots span.done{background:var(--green)}
.topbar .tb-dots span.cur{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite}
.c2 .tb-dots span.cur{background:var(--teal);box-shadow:0 0 6px var(--teal)}

/* Card area */
.card-area{flex:1;display:flex;flex-direction:column;padding:16px}

/* Visual area */
.visual{flex:1;min-height:300px;border-radius:20px;padding:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden;margin-bottom:16px}
.visual::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(129,140,248,.08),rgba(192,132,252,.05));border-radius:20px;border:1px solid rgba(129,140,248,.15)}
.c2 .visual::before{background:linear-gradient(135deg,rgba(45,212,191,.08),rgba(110,231,183,.05));border-color:rgba(45,212,191,.15)}
.visual>*{position:relative;z-index:1}

/* Station sign */
.sign{width:90%;max-width:320px;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.sign .sign-bar{height:10px}
.sign .sign-bar.blue{background:#2563eb}.sign .sign-bar.purple{background:#9333ea}.sign .sign-bar.green{background:#16a34a}.sign .sign-bar.red{background:#dc2626}
.sign .sign-body{background:#fff;padding:16px;text-align:center}
.sign .sign-jp{font-size:1.4em;font-weight:900;color:#1a1a1a;letter-spacing:2px}
.sign .sign-en{font-size:.65em;color:#888;margin-top:2px;letter-spacing:1px}
.sign .sign-num{display:inline-block;background:#eee;border-radius:6px;padding:2px 12px;font-size:.65em;font-weight:700;color:#555;margin-top:6px}
.sign .sign-arrow{font-size:1.5em;margin-top:8px;animation:bounce .8s infinite}

/* Ticket machine */
.machine{width:180px;background:linear-gradient(180deg,#d1d5db,#9ca3af);border-radius:12px;padding:12px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.machine .m-screen{background:#1a1a2e;border-radius:8px;padding:14px;margin-bottom:10px;text-align:center}
.machine .m-screen span{display:block;color:#4ade80;font-size:.7em;font-weight:700;line-height:1.6}
.machine .m-slot{background:#374151;border-radius:4px;height:6px;width:60%;margin:0 auto 8px}
.machine .m-btns{display:flex;gap:6px;justify-content:center}
.machine .m-btns span{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.machine .m-btns .m-charge{background:#22c55e;color:#fff;font-size:10px;font-weight:800;box-shadow:0 0 12px rgba(34,197,94,.5);animation:pulse 1.5s infinite}
.machine .m-btns .m-gray{background:#6b7280}
.machine .m-card{margin-top:10px;text-align:center}
.machine .m-card span{display:inline-block;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:6px;padding:6px 18px;font-size:.6em;color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(99,102,241,.4)}

/* Gate / 改札 */
.gate{display:flex;gap:4px;align-items:flex-end}
.gate .g-panel{width:40px;height:120px;background:linear-gradient(180deg,#6b7280,#4b5563);border-radius:6px 6px 0 0;position:relative}
.gate .g-panel .g-sensor{position:absolute;top:20px;left:50%;transform:translateX(-50%);width:28px;height:28px;border-radius:6px;background:#1f2937;display:flex;align-items:center;justify-content:center;border:2px solid var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 1.5s infinite}
.gate .g-panel .g-sensor span{font-size:12px}
.gate .g-bar{width:60px;height:3px;background:#ef4444;margin-bottom:60px;border-radius:2px}
.gate .g-bar.open{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.5)}

/* Platform layout */
.platform{width:90%;max-width:300px}
.platform .p-track{height:12px;background:repeating-linear-gradient(90deg,#374151 0px,#374151 20px,#1f2937 20px,#1f2937 30px);border-radius:2px;margin:6px 0}
.platform .p-area{background:rgba(255,255,255,.08);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.platform .p-area.active{border-color:var(--accent);background:var(--accent-bg);box-shadow:0 0 12px var(--accent-bg)}
.platform .p-area .p-num{font-size:1.8em;font-weight:900;color:var(--accent);width:50px;text-align:center}
.platform .p-area .p-info{font-size:.7em;color:var(--text2);line-height:1.5}
.platform .p-area .p-info b{color:var(--text)}
.platform .p-warn{text-align:center;margin-top:8px;font-size:.7em;color:var(--red);font-weight:700}

/* Train route line */
.routeline{width:90%;max-width:300px;padding:10px 0}
.routeline .rl-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.routeline .rl-color{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:900}
.rl-color.blue{background:#2563eb}.rl-color.purple{background:#9333ea}.rl-color.green{background:#16a34a}.rl-color.red{background:#dc2626}
.routeline .rl-name{font-size:.9em;font-weight:700}
.routeline .rl-dir{font-size:.7em;color:var(--text2)}
.routeline .rl-stops{position:relative;padding-left:20px}
.routeline .rl-line{position:absolute;left:8px;top:0;bottom:0;width:4px;border-radius:2px}
.rl-line.blue{background:#2563eb}.rl-line.purple{background:#9333ea}.rl-line.green{background:#16a34a}.rl-line.red{background:#dc2626}
.routeline .rl-stop{position:relative;padding:8px 0 8px 16px;font-size:.75em;color:var(--text3)}
.routeline .rl-stop::before{content:'';position:absolute;left:-4px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:var(--bg);border:3px solid var(--text3)}
.routeline .rl-stop.from::before{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent)}
.routeline .rl-stop.from{color:var(--text);font-weight:700}
.routeline .rl-stop.to::before{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green)}
.routeline .rl-stop.to{color:var(--green);font-weight:700}
.routeline .rl-stop .rl-dur{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:.9em;color:var(--text3)}
.routeline .rl-time{text-align:center;margin-top:10px;font-size:.75em;color:var(--text3);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px}

/* Floor cross-section */
.floors{width:85%;max-width:280px}
.floors .fl-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;margin:4px 0}
.floors .fl-row.here{background:var(--accent-bg);border:1px solid var(--accent-border)}
.c2 .floors .fl-row.here{background:var(--teal-bg);border:1px solid var(--teal-border)}
.floors .fl-tag{font-size:.8em;font-weight:900;color:var(--text3);width:40px;text-align:center;flex-shrink:0}
.floors .fl-row.here .fl-tag{color:var(--accent)}
.c2 .floors .fl-row.here .fl-tag{color:var(--teal)}
.floors .fl-body{flex:1;font-size:.8em;color:var(--text2);line-height:1.5}
.floors .fl-body b{color:var(--text)}
.floors .fl-icon{font-size:1.3em;flex-shrink:0}
.floors .fl-you{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 1.5s infinite;margin-right:6px;vertical-align:middle}
.c2 .floors .fl-you{background:var(--teal);box-shadow:0 0 10px var(--teal)}
.floors .fl-arrow{text-align:center;font-size:24px;color:var(--text3);animation:bounce .8s infinite;margin:2px 0}
.floors .fl-esc{text-align:center;font-size:.65em;color:var(--text3);margin:2px 0}

/* Walk path */
.walkpath{width:85%;max-width:300px;position:relative}
.walkpath .wp-road{height:50px;background:repeating-linear-gradient(90deg,#374151 0,#374151 40px,#fbbf24 40px,#fbbf24 42px,#374151 42px,#374151 82px);border-radius:6px;margin:12px 0;position:relative}
.walkpath .wp-road::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 30%,transparent 30%);border-radius:6px;opacity:.2;animation:walkProgress 3s ease infinite}
.walkpath .wp-from,.walkpath .wp-to{display:flex;align-items:center;gap:8px;font-size:.8em}
.walkpath .wp-from .wp-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.walkpath .wp-to .wp-dot{width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.walkpath .wp-time{text-align:center;font-size:2em;font-weight:900;color:var(--text);margin:8px 0}
.walkpath .wp-label{text-align:center;font-size:.7em;color:var(--text3)}

/* Arrival */
.arrival{text-align:center}
.arrival .ar-emoji{font-size:80px;margin-bottom:12px;animation:bounce .8s infinite}
.arrival .ar-name{font-size:1.5em;font-weight:900;background:linear-gradient(135deg,#4ade80,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Departure board (LED) */
.board{width:90%;max-width:320px;background:#111;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5);margin-top:14px}
.board .bd-header{display:flex;padding:6px 12px;font-size:.5em;color:#555;border-bottom:1px solid #222}
.board .bd-header span{flex:1}
.board .bd-row{display:flex;padding:7px 12px;font-size:.65em;color:#4ade80;font-family:'Courier New',monospace;border-bottom:1px solid #1a1a1a}
.board .bd-row span{flex:1}
.board .bd-row.hl{color:#fbbf24;text-shadow:0 0 8px rgba(251,191,36,.5);animation:pulse 1.5s infinite}

/* IC card tap */
.ic-tap{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:14px}
.ic-tap .tap-card{width:110px;height:70px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65em;font-weight:700;box-shadow:0 4px 16px rgba(99,102,241,.4);animation:tapMove 1.5s ease infinite}
.ic-tap .tap-sensor{width:70px;height:70px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.3em;position:relative}
.ic-tap .tap-sensor::after{content:'ピッ';position:absolute;top:-6px;right:-18px;font-size:.45em;color:var(--green);font-weight:700;opacity:0;animation:tapBeep 1.5s ease infinite}
.ic-tap .tap-ok{font-size:.65em;color:var(--green);font-weight:700}
@keyframes tapMove{0%,100%{transform:translateY(0)}40%,60%{transform:translateY(16px)}}
@keyframes tapBeep{0%,50%{opacity:0}60%{opacity:1}100%{opacity:0}}

/* Escalator */
.esc-vis{display:flex;align-items:center;gap:12px;margin-top:12px}
.esc-vis .esc-box{width:50px;height:90px;background:linear-gradient(180deg,#374151,#1f2937);border-radius:8px;position:relative;overflow:hidden}
.esc-vis .esc-steps{position:absolute;inset:4px;background:repeating-linear-gradient(180deg,#4b5563 0px,#4b5563 7px,#374151 7px,#374151 14px);border-radius:4px;animation:escMove 1s linear infinite}
.esc-vis.up .esc-steps{animation-direction:reverse}
.esc-vis .esc-label{font-size:.75em;color:var(--text2);line-height:1.5}
.esc-vis .esc-label b{display:block;color:var(--text);font-size:1.1em}
@keyframes escMove{0%{background-position:0 0}100%{background-position:0 14px}}

/* Transfer corridor */
.transfer{width:90%;max-width:320px;margin-top:14px}
.transfer .tf-ends{display:flex;justify-content:space-between;align-items:center}
.transfer .tf-end{text-align:center;padding:6px 10px;border-radius:8px;font-size:.65em;font-weight:700;background:var(--card);border:1px solid var(--border)}
.transfer .tf-end .tf-dot{width:28px;height:6px;border-radius:3px;margin:0 auto 4px}
.transfer .tf-corridor{height:36px;margin:6px 0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 18px,transparent 18px,transparent 20px);border-radius:6px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center}
.transfer .tf-corridor .tf-person{animation:tfWalk 2.5s linear infinite;font-size:1.1em}
.transfer .tf-time{text-align:center;font-size:.65em;color:var(--text3)}
@keyframes tfWalk{0%{transform:translateX(-50px)}100%{transform:translateX(50px)}}

/* Exit sign */
.exit-sign{background:#1a8c3a;border-radius:10px;padding:12px 20px;display:inline-flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(26,140,58,.3);margin-top:12px}
.exit-sign .es-icon{font-size:1.8em}
.exit-sign .es-body{color:#fff}
.exit-sign .es-num{font-size:1.3em;font-weight:900;letter-spacing:2px}
.exit-sign .es-sub{font-size:.6em;opacity:.8}

/* Map frame */
.map-frame{margin:12px 0;border-radius:14px;overflow:hidden;position:relative;border:1px solid var(--border)}
.map-frame iframe{width:100%;height:200px;border:0;display:block}
.map-frame .mf-label{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:.55em;padding:2px 8px;border-radius:4px;z-index:1;pointer-events:none}
.map-fallback{display:none;padding:14px;text-align:center;background:var(--card);border-radius:14px;border:1px solid var(--border);font-size:.8em}
.map-fallback a{color:var(--accent);text-decoration:none;font-weight:600}
body.offline .map-frame{display:none}
body.offline .map-fallback{display:block}

/* Additional route colors */
.sign .sign-bar.orange{background:#f59e0b}
.rl-color.orange{background:#f59e0b}
.rl-line.orange{background:#f59e0b}
.rl-color.yellow{background:#eab308}
.rl-line.yellow{background:#eab308}

/* Landing: sections */
.l-section{margin-top:20px}
.ls-title{font-size:.7em;color:var(--text3);font-weight:700;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ls-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Preset grid */
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.preset-item{border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:.15s}
.preset-item:active{transform:scale(.95);background:rgba(255,255,255,.1)}
.preset-item .pi-emoji{font-size:1.4em;margin-bottom:4px}
.preset-item .pi-name{font-size:.85em;font-weight:700}
.preset-item .pi-via{font-size:.5em;color:var(--text3);margin-top:3px;line-height:1.3}

/* Search section */
.search-row{display:flex;gap:8px;margin-top:8px}
.search-row input{flex:1;border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:.85em;font-family:inherit;background:var(--card);color:var(--text);outline:none}
.search-row input::placeholder{color:var(--text3)}
.search-row input:focus{border-color:var(--accent)}
.search-row button{padding:12px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700;font-size:.8em;cursor:pointer;white-space:nowrap}
.search-row button:active{opacity:.8}
.search-hint{font-size:.6em;color:var(--text3);margin-top:6px}

@keyframes walkProgress{0%{width:0}50%{width:100%}100%{width:100%}}

/* Instruction */
.instruction{margin-bottom:12px}
.instruction .ins-cn{font-size:1.3em;font-weight:800;line-height:1.4}
.instruction .ins-jp{font-size:.8em;color:var(--text2);margin-top:4px}

/* Warning */
.ins-warn{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:12px;padding:12px;margin-bottom:12px;font-size:.8em;color:var(--red);line-height:1.5}
.ins-warn .iw-jp{color:rgba(248,113,113,.6);font-size:.85em;display:block;margin-top:4px}

/* Tip */
.ins-tip{background:var(--green-bg);border:1px solid rgba(74,222,128,.2);border-radius:12px;padding:12px;margin-bottom:12px;font-size:.8em;color:var(--green);line-height:1.5}
.ins-tip .it-jp{color:rgba(74,222,128,.6);font-size:.85em;display:block;margin-top:4px}

/* Link */
.ins-link{display:block;text-decoration:none;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:12px;padding:12px;margin-bottom:12px;text-align:center;font-size:.8em;font-weight:600;color:var(--accent);line-height:1.4}
.ins-link:active{opacity:.7}

/* Done button */
.done-btn{width:100%;padding:18px;border:none;border-radius:14px;font-size:1.1em;font-weight:700;color:#fff;cursor:pointer;position:relative;overflow:hidden;transition:.15s}
.done-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.c2 .done-btn{background:linear-gradient(135deg,#14b8a6,#0d9488)}
.done-btn.final{background:linear-gradient(135deg,#22c55e,#16a34a)}
.done-btn:active{transform:scale(.97);opacity:.9}
.done-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.1),transparent);animation:shimmer 3s infinite}

/* Bottom status */
.bottom-bar{padding:12px 16px;border-top:1px solid var(--border);background:rgba(10,14,26,.95);display:flex;align-items:center;justify-content:space-between;font-size:.7em;color:var(--text3)}
.bottom-bar .bb-dest{display:flex;align-items:center;gap:6px}
.bottom-bar .bb-dest .bd-pin{color:var(--accent)}
.c2 .bb-dest .bd-pin{color:var(--teal)}

/* ===== DONE SCREEN ===== */
.done-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.done-wrap .dw-emoji{font-size:80px;margin-bottom:20px}
.done-wrap .dw-title{font-size:1.6em;font-weight:800;background:linear-gradient(135deg,#4ade80,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.done-wrap .dw-sub{font-size:.9em;color:var(--text2);margin:12px 0 30px;line-height:1.6}
.done-wrap button{padding:12px 30px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text2);font-size:.85em;cursor:pointer}

/* ===== TOOLS (translate + phrases) ===== */
.tools-toggle{position:fixed;bottom:16px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.tools-toggle:active{transform:scale(.9)}
.tools-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;max-height:70vh;background:var(--bg2);border-top-left-radius:20px;border-top-right-radius:20px;border:1px solid var(--border);border-bottom:none;z-index:300;display:none;overflow:hidden;flex-direction:column}
.tools-panel.open{display:flex}
.tp-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.tp-header span{font-weight:700;font-size:.95em}
.tp-header button{background:none;border:none;color:var(--text3);font-size:1.2em;cursor:pointer;padding:4px}
.tp-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 20px;flex:1}
.tp-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;padding:0 16px 8px}
.tp-tabs::-webkit-scrollbar{display:none}
.tp-tab{padding:7px 14px;border:1px solid var(--border);border-radius:8px;font-size:.75em;white-space:nowrap;cursor:pointer;background:transparent;color:var(--text3);flex-shrink:0}
.tp-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer}
.ph-card:active{background:rgba(255,255,255,.1)}
.ph-card .ph-jp{font-size:1.05em;font-weight:700;color:var(--red);line-height:1.5}
.ph-card .ph-cn{font-size:.75em;color:var(--text3);margin-top:2px}
/* Translator in panel */
.tr-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.tr-section .tr-label{font-size:.85em;font-weight:700;margin-bottom:8px}
.tr-swap{display:flex;align-items:center;justify-content:center;gap:8px;margin:6px 0 10px;font-size:.75em;color:var(--text3)}
.tr-swap button{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:2px 12px;font-size:16px;cursor:pointer;color:var(--text2)}
.tr-row{display:flex;gap:8px}
.tr-row textarea{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:.9em;font-family:inherit;resize:none;height:44px;background:var(--card);color:var(--text);outline:none}
.tr-row textarea::placeholder{color:var(--text3)}
.tr-row textarea:focus{border-color:var(--accent)}
.tr-row .tr-btn{width:52px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700;cursor:pointer;flex-shrink:0}
.tr-row .tr-btn:disabled{opacity:.4}
.tr-result{margin-top:10px;display:none}
.tr-result.show{display:block}
.tr-result-card{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:12px;padding:14px;cursor:pointer}
.tr-result-card:active{opacity:.7}
.tr-result-card .trc-jp{font-size:1.2em;font-weight:700;color:var(--accent);line-height:1.5}
.tr-result-card .trc-cn{font-size:.75em;color:var(--text3);margin-top:4px}
.tr-result-card .trc-hint{font-size:.65em;color:var(--text3);margin-top:6px;opacity:.5}
.tr-error{margin-top:6px;font-size:.75em;color:var(--red)}

/* Show overlay */
.show-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:30px;cursor:pointer}
.show-overlay.open{display:flex}
.show-overlay .so-jp{font-size:2.2em;font-weight:700;color:#fff;text-align:center;line-height:1.6}
body.senior .show-overlay .so-jp{font-size:2.8em}
.show-overlay .so-cn{font-size:1em;color:rgba(255,255,255,.35);text-align:center;margin-top:12px}
.show-overlay .so-close{font-size:.7em;color:rgba(255,255,255,.15);margin-top:40px}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@keyframes shimmer{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.card-area{animation:fadeUp .3s ease}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden}
.confetti span{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 3s linear forwards}
</style>
</head>
<body>
<div id="app"></div>

<button class="tools-toggle" id="toolsBtn" onclick="openTools()">📖</button>

<script>
// ===== VISUAL GENERATORS =====
function vSign(jp,en,barColor,num,arrow){
  return `<div class="sign"><div class="sign-bar ${barColor}"></div><div class="sign-body">
    <div class="sign-jp">${jp}</div><div class="sign-en">${en}</div>
    ${num?`<div class="sign-num">${num}</div>`:''}
    ${arrow?`<div class="sign-arrow">${arrow}</div>`:''}
  </div></div>`;
}
function vMachine(){
  return `<div class="machine">
    <div class="m-screen"><span>チャージ</span><span style="color:#fbbf24">充值 Charge</span></div>
    <div class="m-slot"></div>
    <div class="m-btns"><span class="m-gray"></span><span class="m-charge">充值</span><span class="m-gray"></span></div>
    <div class="m-card"><span>💳 Suica / PASMO</span></div>
  </div>`;
}
function vGate(open){
  return `<div class="gate">
    <div class="g-panel"><div class="g-sensor"><span>💳</span></div></div>
    <div class="g-bar ${open?'open':''}"></div>
    <div class="g-panel"></div>
    <div class="g-bar ${open?'open':''}"></div>
    <div class="g-panel"></div>
  </div>`;
}
function vPlatform(num,label,warnText){
  return `<div class="platform">
    <div class="p-track"></div>
    <div class="p-area active"><div class="p-num">${num}</div><div class="p-info"><b>${label}</b></div></div>
    <div class="p-track"></div>
    ${warnText?`<div class="p-warn">✕ ${warnText}</div>`:''}
  </div>`;
}
function vRoute(color,name,from,to,midStops,dur){
  let stops=`<div class="rl-stop from">${from}</div>`;
  if(midStops) midStops.forEach(s=>{stops+=`<div class="rl-stop">${s}</div>`});
  stops+=`<div class="rl-stop to">${to}<span class="rl-dur">🚃</span></div>`;
  return `<div class="routeline">
    <div class="rl-header"><div class="rl-color ${color}">🚃</div><div><div class="rl-name">${name}</div></div></div>
    <div class="rl-stops"><div class="rl-line ${color}"></div>${stops}</div>
    <div class="rl-time">⏱ ${dur}</div>
  </div>`;
}
function vFloors(rows){
  let h='<div class="floors">';
  rows.forEach((r,i)=>{
    if(r.tag==='↓'){h+=`<div class="fl-arrow">↓</div><div class="fl-esc">🔽 扶梯 / エスカレーター</div>`;return}
    h+=`<div class="fl-row ${r.here?'here':''}">
      <span class="fl-tag">${r.tag}</span>
      <span class="fl-body">${r.here?'<span class="fl-you"></span>':''}${r.text}</span>
      ${r.icon?`<span class="fl-icon">${r.icon}</span>`:''}
    </div>`;
  });
  return h+'</div>';
}
function vWalk(from,to,time,label){
  return `<div class="walkpath">
    <div class="wp-from"><div class="wp-dot"></div><span>${from}</span></div>
    <div class="wp-road"></div>
    <div class="wp-to"><div class="wp-dot"></div><span>${to}</span></div>
    <div class="wp-time">🚶 ${time}</div>
    ${label?`<div class="wp-label">${label}</div>`:''}
  </div>`;
}
function vArrival(name){
  return `<div class="arrival"><div class="ar-emoji">🏠</div><div class="ar-name">${name||'西大島駅'}</div></div>`;
}
// New visual generators
function vBoard(lines){
  let h='<div class="board"><div class="bd-header"><span>のりば</span><span>行先</span><span>発車</span></div>';
  lines.forEach(l=>{h+=`<div class="bd-row ${l.hl?'hl':''}"><span>${l.num}</span><span>${l.dest}</span><span>${l.time}</span></div>`});
  return h+'</div>';
}
function vTap(){
  return `<div class="ic-tap"><div class="tap-card">💳 IC Card</div><div class="tap-sensor">📶</div><div class="tap-ok">✓ ピッ！通过</div></div>`;
}
function vEscalator(dir,from,to){
  return `<div class="esc-vis ${dir}"><div class="esc-box"><div class="esc-steps"></div></div><div class="esc-label"><b>${dir==='down'?'⬇':'⬆'} ${to}</b>${from} → ${to}</div></div>`;
}
function vTransfer(from,fromColor,to,toColor,time){
  return `<div class="transfer"><div class="tf-ends"><div class="tf-end"><div class="tf-dot" style="background:${fromColor}"></div>${from}</div><div class="tf-end"><div class="tf-dot" style="background:${toColor}"></div>${to}</div></div><div class="tf-corridor"><span class="tf-person">🚶</span></div><div class="tf-time">🚶 ${time}</div></div>`;
}
function vExit(num,sub){
  return `<div class="exit-sign"><span class="es-icon">🚪</span><div class="es-body"><div class="es-num">出口 ${num}</div><div class="es-sub">${sub}</div></div></div>`;
}

// ===== STATE =====
let S=loadS();
let senior=localStorage.getItem('narita-senior')==='1';
if(senior) document.body.classList.add('senior');

function loadS(){
  try{
    const s=JSON.parse(localStorage.getItem('narita-v6'));
    if(s&&s.mode!==undefined) return s;
    // Migrate from v5
    const s5=JSON.parse(localStorage.getItem('narita-v5'));
    if(s5&&s5.route!==null) return {mode:'route',route:s5.route,card:s5.card,preset:null};
  }catch(e){}
  return {mode:null,route:null,card:0,preset:null};
}
function saveS(){localStorage.setItem('narita-v6',JSON.stringify(S))}
function resetS(){S={mode:null,route:null,card:0,preset:null};saveS();render()}

// ===== RENDER =====
const app=document.getElementById('app');

function render(){
  document.getElementById('toolsBtn').style.display=S.mode?'flex':'none';
  if(!S.mode) return renderLanding();
  let src;
  if(S.mode==='route') src=ROUTES[S.route];
  else if(S.mode==='preset') src=PRESETS[S.preset];
  else return renderLanding();
  if(S.card>=src.cards.length) renderComplete(src);
  else renderNav(src);
}

function renderLanding(){
  let saved=null;
  try{
    const s=JSON.parse(localStorage.getItem('narita-v6'));
    if(s&&s.mode) saved=s;
  }catch(e){}
  let resumeH='';
  if(saved){
    let src=saved.mode==='route'?ROUTES[saved.route]:saved.mode==='preset'?PRESETS[saved.preset]:null;
    if(src){
      const cn=saved.card<src.cards.length?src.cards[saved.card].instruction.cn:'已完成';
      resumeH=`<div class="resume-bar" onclick="S=loadS();render()">
        <div class="rb-dot"></div>
        <div class="rb-text"><b>继续上次进度</b>${src.name} · ${cn}</div>
        <div class="rb-go">继续 ›</div>
      </div>`;
    }
  }
  let h=`<div class="landing"><div class="brand">
    <div class="logo">🚃</div><h1>成田空港 换乘导航</h1>
    <div class="sub">中日双语导航 / 中日二ヶ国語乗換ナビ</div>
  </div>${resumeH}`;

  // Detailed routes section
  h+=`<div class="l-section"><div class="ls-title">🏠 详细路线 · 西大島</div></div>`;
  ROUTES.forEach((r,i)=>{
    h+=`<div class="rc ${i?'t2':''}" onclick="selectRoute(${i})">
      <span class="rc-badge">${r.badge}</span>
      <div class="rc-name">${r.name}</div>
      <div class="rc-visual">${r.stops.map((s,j)=>`${j?'<span class="rv-arrow">→</span>':''}<span class="rv-stop">${s}</span>`).join('')}</div>
      <div class="rc-meta">${r.meta.map(m=>`<span>${m}</span>`).join('')}</div>
      <div class="rc-go">›</div>
    </div>`;
  });

  // Preset destinations
  h+=`<div class="l-section"><div class="ls-title">🗼 热门目的地</div></div>`;
  h+=`<div class="preset-grid">`;
  PRESETS.forEach((p,i)=>{
    h+=`<div class="preset-item" onclick="selectPreset(${i})">
      <div class="pi-emoji">${p.emoji}</div>
      <div class="pi-name">${p.name}</div>
      <div class="pi-via">${p.time} · ${p.cost}</div>
    </div>`;
  });
  h+=`</div>`;

  // Free search
  h+=`<div class="l-section"><div class="ls-title">✈️ 自由搜索</div></div>`;
  h+=`<div class="search-row">
    <input type="text" placeholder="输入目的地站名..." id="searchDest">
    <button onclick="openSearch()">导航</button>
  </div>
  <div class="search-hint">将打开 Google Maps 公交路线（从成田空港出发）</div>`;

  h+=`<div class="l-footer">
    <button onclick="toggleSenior()">${senior?'✓ ':''}大字模式</button>
    <button onclick="installPWA()">📲 添加到桌面</button>
  </div></div>`;
  app.innerHTML=h;
}

function renderNav(src){
  const ci=src.cls||'';
  const card=src.cards[S.card];
  const total=src.cards.length;
  const destName=src.dest||src.name;

  let dots='';
  for(let i=0;i<total;i++){
    const c=i<S.card?'done':i===S.card?'cur':'';
    dots+=`<span class="${c}"></span>`;
  }

  let h=`<div class="nav ${ci}">
    <div class="topbar">
      <button class="tb-back" onclick="goBack()">✕</button>
      <span class="tb-step">STEP ${S.card+1} / ${total}</span>
      <div class="tb-dots">${dots}</div>
    </div>
    <div class="card-area">`;

  // Visual
  h+=`<div class="visual">${card.vis?card.vis():''}</div>`;

  // Map embed
  if(card.mapEmbed){
    h+=`<div class="map-frame">
      <span class="mf-label">📍 Google Maps</span>
      <iframe src="${card.mapEmbed}" loading="lazy" referrerpolicy="no-referrer"></iframe>
    </div>
    <div class="map-fallback"><a href="${card.mapEmbed.replace('&output=embed','')}" target="_blank">📍 在 Google Maps 中打开</a></div>`;
  }

  // Instruction
  h+=`<div class="instruction">
    <div class="ins-cn">${card.instruction.cn}</div>
    <div class="ins-jp">${card.instruction.jp}</div>
  </div>`;

  // Warning
  if(card.warn) h+=`<div class="ins-warn">${card.warn.cn}<span class="iw-jp">${card.warn.jp}</span></div>`;
  // Tip
  if(card.tip) h+=`<div class="ins-tip">${card.tip.cn}<span class="it-jp">${card.tip.jp}</span></div>`;
  // Link
  if(card.link) h+=`<a class="ins-link" href="${card.link.url}" target="_blank">🗺️ ${card.link.text}</a>`;

  // Button
  const isFinal=card.isFinal;
  h+=`<button class="done-btn ${isFinal?'final':''}" onclick="nextCard()">
    ${isFinal?'🎉 到达了！':'做到了 ✓'}
  </button>`;

  h+=`</div>`;

  // Bottom bar
  const stepsLeft=total-S.card-1;
  h+=`<div class="bottom-bar">
    <div class="bb-dest"><span class="bd-pin">📍</span> ${destName}</div>
    <span>还有 ${stepsLeft} 步</span>
  </div>`;

  h+=`</div>`;
  app.innerHTML=h;
}

function renderComplete(src){
  const destName=src.dest||src.name;
  app.innerHTML=`<div class="done-wrap">
    <div class="dw-emoji">🎉🏠</div>
    <div class="dw-title">到${destName}了！</div>
    <div class="dw-sub">お疲れ様でした！<br>全 ${src.cards.length} 步已完成</div>
    <button onclick="resetS()">重新开始</button>
  </div>`;
  showConfetti();
}

// ===== ACTIONS =====
function selectRoute(i){S={mode:'route',route:i,card:0,preset:null};saveS();render();window.scrollTo(0,0)}
function selectPreset(i){S={mode:'preset',route:null,card:0,preset:i};saveS();render();window.scrollTo(0,0)}
function nextCard(){S.card++;saveS();render();window.scrollTo(0,0)}
function goBack(){S={mode:null,route:null,card:0,preset:null};saveS();render();window.scrollTo(0,0);closeTools()}
function toggleSenior(){senior=!senior;document.body.classList.toggle('senior',senior);localStorage.setItem('narita-senior',senior?'1':'0');render()}
function openSearch(){
  const dest=document.getElementById('searchDest').value.trim();
  if(!dest) return;
  window.open('https://www.google.com/maps/dir/'+encodeURIComponent('成田空港')+'/'+encodeURIComponent(dest)+'/?travelmode=transit','_blank');
}

// ===== TOOLS PANEL =====
function openTools(){
  const p=document.getElementById('toolsPanel');
  if(p.classList.contains('open')){closeTools();return}
  const cats=Object.keys(PHRASES);
  const ac=window._tc||cats[0];
  const trDir=window._trDir||'zh2ja';
  const trR=window._trResult||'';
  const trSrc=window._trSource||'';
  const trE=window._trError||'';
  const trL=window._trLoading||false;
  const srcL=trDir==='zh2ja'?'中文':'日本語';
  const tgtL=trDir==='zh2ja'?'日本語':'中文';

  let h=`<div class="tp-header"><span>📖 翻译助手</span><button onclick="closeTools()">✕</button></div>
    <div class="tp-tabs">${cats.map(c=>`<div class="tp-tab ${c===ac?'on':''}" onclick="switchTC('${c}')">${PHRASES[c].icon} ${PHRASES[c].label}</div>`).join('')}</div>
    <div class="tp-body">`;

  PHRASES[ac].items.forEach(item=>{
    h+=`<div class="ph-card" onclick="showPhrase('${esc(item.jp)}','${esc(item.cn)}')">
      <div class="ph-jp">${item.jp}</div><div class="ph-cn">${item.cn}</div>
    </div>`;
  });

  h+=`<div class="tr-section">
    <div class="tr-label">✏️ 实时翻译</div>
    <div class="tr-swap"><span>${srcL}</span><button onclick="swapDir()">⇄</button><span>${tgtL}</span></div>
    <div class="tr-row">
      <textarea id="trInput" placeholder="${trDir==='zh2ja'?'输入中文...':'日本語を入力...'}">${trSrc}</textarea>
      <button class="tr-btn" onclick="doTranslate()" ${trL?'disabled':''}>${trL?'...':'翻译'}</button>
    </div>
    ${trE?`<div class="tr-error">${trE}</div>`:''}
    <div class="tr-result ${trR?'show':''}">
      <div class="tr-result-card" onclick="showPhrase('${esc(trDir==='zh2ja'?trR:trSrc)}','${esc(trDir==='zh2ja'?trSrc:trR)}')">
        <div class="trc-jp">${trR}</div><div class="trc-cn">${trSrc}</div>
        <div class="trc-hint">点击放大给对方看</div>
      </div>
    </div>
  </div></div>`;

  p.innerHTML=h;
  p.classList.add('open');
}
function closeTools(){document.getElementById('toolsPanel').classList.remove('open')}
function switchTC(c){window._tc=c;openTools()}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function showPhrase(jp,cn){document.getElementById('soJp').textContent=jp;document.getElementById('soCn').textContent=cn;document.getElementById('showOverlay').classList.add('open')}
function closeShow(){document.getElementById('showOverlay').classList.remove('open')}
function swapDir(){window._trDir=(window._trDir||'zh2ja')==='zh2ja'?'ja2zh':'zh2ja';window._trResult='';window._trSource='';window._trError='';openTools()}
async function doTranslate(){
  const text=document.getElementById('trInput').value.trim();if(!text)return;
  const dir=window._trDir||'zh2ja';const sl=dir==='zh2ja'?'zh-CN':'ja';const tl=dir==='zh2ja'?'ja':'zh-CN';
  window._trLoading=true;window._trSource=text;window._trError='';openTools();
  try{const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);if(!r.ok)throw 0;const d=await r.json();window._trResult=d[0].map(s=>s[0]).join('')}
  catch(e){window._trResult='';window._trError='翻译失败'}
  window._trLoading=false;openTools();
}

// ===== PWA + OFFLINE =====
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}else alert('请用浏览器的"添加到主屏幕"功能')}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');

// Offline detection
function updateOnline(){document.body.classList.toggle('offline',!navigator.onLine)}
window.addEventListener('online',updateOnline);
window.addEventListener('offline',updateOnline);
updateOnline();

// Confetti
function showConfetti(){const c=document.createElement('div');c.className='confetti';const cols=['#818cf8','#f472b6','#4ade80','#fbbf24','#2dd4bf','#f87171'];for(let i=0;i<40;i++){const s=document.createElement('span');s.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px`;c.appendChild(s)}document.body.appendChild(c);setTimeout(()=>c.remove(),5000)}

// INIT
render();
</script>
</body>
